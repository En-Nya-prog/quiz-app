{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card p-4 shadow">
      <h3 class="text-center mb-2">Forgot Password 🔑</h3>
      <p class="text-muted text-center mb-4">Enter your email and we'll send a reset link.</p>
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" required />
        </div>
        <button class="btn btn-primary w-100">Send Reset Link</button>
      </form>
      <p class="text-center mt-3 text-muted"><a href="{{ url_for('auth.login') }}">Back to Login</a></p>
    </div>
  </div>
</div>
{% endblock %}
