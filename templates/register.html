{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card p-4 shadow">
      <h3 class="text-center mb-4">Create Account</h3>
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <input type="password" name="password" id="password" class="form-control" required />
            <button type="button" class="btn btn-outline-secondary"
                    onclick="togglePassword('password', this)"
                    style="border-color:#475569; background:#1e293b; color:#94a3b8;">👁</button>
          </div>
          <small class="text-muted">Min 8 characters, 1 uppercase letter, 1 number</small>
        </div>
        <button class="btn btn-primary w-100">Register</button>
      </form>
      <p class="text-center mt-3 text-muted">Have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
    </div>
  </div>
</div>
<script>
  function togglePassword(fieldId, btn) {
    const field = document.getElementById(fieldId);
    if (field.type === "password") { field.type = "text"; btn.textContent = "🙈"; }
    else { field.type = "password"; btn.textContent = "👁"; }
  }
</script>
{% endblock %}
