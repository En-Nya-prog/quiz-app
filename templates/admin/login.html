<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    * { color: #e2e8f0 !important; }
    body { background:#0a0f1e; font-family:'Segoe UI',sans-serif; }
    .card { background:#0f172a; border:1px solid #1e293b; border-radius:12px; }
    .form-control { background:#1e293b !important; color:#e2e8f0 !important; border:1px solid #334155 !important; }
    .form-control:focus { border-color:#6366f1 !important; box-shadow:0 0 0 3px rgba(99,102,241,0.2) !important; }
    .btn-primary { background:#6366f1; border-color:#6366f1; color:#fff !important; }
    .btn-outline-secondary { border-color:#475569; background:#1e293b; color:#94a3b8 !important; }
    .alert-danger { background:#7f1d1d; color:#fca5a5 !important; border:none; border-radius:8px; }
    .text-muted { color:#94a3b8 !important; }
    label { color:#cbd5e1 !important; }
  </style>
</head>
<body>
<div class="d-flex justify-content-center align-items-center" style="min-height:100vh;">
  <div class="card p-4 shadow" style="width:380px;">
    <div class="text-center mb-4">
      <div style="font-size:2.5rem;">🛡️</div>
      <h4 class="mt-2">Admin Login</h4>
      <p class="text-muted small">Restricted access only</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <input type="password" name="password" id="password" class="form-control" required />
          <button type="button" class="btn btn-outline-secondary"
                  onclick="togglePassword('password', this)">👁</button>
        </div>
      </div>
      <button class="btn btn-primary w-100">Login as Admin</button>
    </form>
  </div>
</div>
<script>
  function togglePassword(fieldId, btn) {
    const field = document.getElementById(fieldId);
    if (field.type === "password") { field.type = "text"; btn.textContent = "🙈"; }
    else { field.type = "password"; btn.textContent = "👁"; }
  }
</script>
</body>
</html>
