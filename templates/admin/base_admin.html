<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Panel — AI Quiz</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    .text-muted { color: #cbd5e1 !important; }
    body { background:#0a0f1e; color:#e2e8f0; font-family:'Segoe UI',sans-serif; }
    .sidebar { background:#0f172a; min-height:100vh; border-right:1px solid #1e293b; width:220px; position:fixed; top:0; left:0; padding:20px 0; z-index:100; }
    .sidebar .brand { padding:0 20px 20px; border-bottom:1px solid #1e293b; margin-bottom:10px; }
    .sidebar .brand h5 { color:#a5b4fc; margin:0; font-weight:700; }
    .sidebar a { display:block; padding:10px 20px; color:#94a3b8; text-decoration:none; transition:all 0.2s; font-size:0.9rem; }
    .sidebar a:hover, .sidebar a.active { background:#1e293b; color:#e2e8f0; border-left:3px solid #6366f1; }
    .main-content { margin-left:220px; padding:30px; }
    .stat-card { background:#0f172a; border:1px solid #1e293b; border-radius:12px; padding:20px; }
    .stat-number { font-size:2.5rem; font-weight:800; }
    .table-dark { background:transparent; }
    .table-dark td, .table-dark th { border-color:#1e293b !important; color:#e2e8f0; vertical-align:middle; }
    .table-dark tbody tr:hover { background:#1e293b !important; }
    .badge-easy { background:#10b981; padding:4px 10px; border-radius:20px; font-size:0.78rem; }
    .badge-medium { background:#f59e0b; padding:4px 10px; border-radius:20px; font-size:0.78rem; }
    .badge-hard { background:#ef4444; padding:4px 10px; border-radius:20px; font-size:0.78rem; }
    .card-admin { background:#0f172a; border:1px solid #1e293b; border-radius:12px; }
    .alert-success { background:#065f46; color:#6ee7b7; border:none; }
    .alert-danger  { background:#7f1d1d; color:#fca5a5; border:none; }
    .alert-warning { background:#78350f; color:#fde68a; border:none; }
    .alert-info    { background:#1e3a5f; color:#93c5fd; border:none; }
    .form-control, .form-select { background:#1e293b !important; color:#e2e8f0 !important; border:1px solid #334155 !important; }
    .form-control:focus { border-color:#6366f1 !important; box-shadow:0 0 0 3px rgba(99,102,241,0.2) !important; }
    .btn-primary { background:#6366f1; border-color:#6366f1; }
    .btn-primary:hover { background:#4f46e5; border-color:#4f46e5; }
  </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="brand">
    <h5>🛡️ Admin Panel</h5>
    <small style="color:#64748b;">{{ session.get('admin_username','Admin') }}</small>
  </div>
  <a href="{{ url_for('admin.dashboard') }}" class="{{ 'active' if request.endpoint == 'admin.dashboard' }}">📊 Dashboard</a>
  <a href="{{ url_for('admin.users') }}" class="{{ 'active' if request.endpoint == 'admin.users' }}">👥 Users</a>
  <a href="{{ url_for('admin.quizzes') }}" class="{{ 'active' if request.endpoint == 'admin.quizzes' }}">📋 All Quizzes</a>
  <a href="{{ url_for('admin.logout') }}" style="color:#ef4444; margin-top:20px;">🚪 Logout</a>
</div>

<!-- Main -->
<div class="main-content">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show mb-3">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
